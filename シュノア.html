<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Schnorr Signature Tool</title>
  <link rel="icon" href="https://illustimage.com/photo/12720.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; touch-action: manipulation; }
    :root {
      --bg: #f7f6f3; --surface: #ffffff; --border: #e2e0db;
      --text: #1a1917; --muted: #8a8780; --accent: #1a1917;
      --success: #2d6a4f; --error: #c1121f;
      --mono: 'JetBrains Mono', monospace; --sans: 'DM Sans', sans-serif;
    }
    body { margin:0; padding:0; background:var(--bg); color:var(--text); font-family:var(--sans); font-size:14px; line-height:1.6; min-height:100vh; }
    header { padding:32px 40px 24px; border-bottom:1px solid var(--border); background:var(--surface); }
    header h1 { margin:0; font-family:var(--mono); font-size:18px; font-weight:400; letter-spacing:0.05em; }
    header p { margin:4px 0 0; font-size:12px; color:var(--muted); font-family:var(--mono); }
    .tabs { display:flex; padding:0 40px; background:var(--surface); border-bottom:1px solid var(--border); }
    .tab { padding:12px 20px; font-family:var(--mono); font-size:12px; color:var(--muted); cursor:pointer; border:none; background:none; border-bottom:2px solid transparent; margin-bottom:-1px; transition:color 0.15s,border-color 0.15s; letter-spacing:0.05em; }
    .tab:hover { color:var(--text); }
    .tab.active { color:var(--text); border-bottom-color:var(--text); }
    .panels { max-width:720px; margin:0 auto; padding:32px 40px; }
    .panel { display:none; }
    .panel.active { display:block; }
    .field { margin-bottom:20px; }
    label { display:block; font-family:var(--mono); font-size:11px; font-weight:500; letter-spacing:0.08em; color:var(--muted); text-transform:uppercase; margin-bottom:6px; }
    input[type="text"], textarea { width:100%; padding:10px 12px; font-family:var(--mono); font-size:12px; line-height:1.6; color:var(--text); background:var(--surface); border:1px solid var(--border); border-radius:4px; outline:none; resize:vertical; transition:border-color 0.15s; }
    input[type="text"]:focus, textarea:focus { border-color:var(--text); }
    textarea { min-height:72px; }
    .output { width:100%; padding:10px 12px; font-family:var(--mono); font-size:11px; line-height:1.7; color:var(--text); background:var(--bg); border:1px solid var(--border); border-radius:4px; word-break:break-all; min-height:40px; white-space:pre-wrap; user-select:all; }
    .output-wrap { position:relative; }
    .copy-btn { position:absolute; top:6px; right:6px; padding:3px 8px; font-family:var(--mono); font-size:10px; color:var(--muted); background:var(--surface); border:1px solid var(--border); border-radius:3px; cursor:pointer; transition:color 0.15s,border-color 0.15s; }
    .copy-btn:hover { color:var(--text); border-color:var(--text); }
    button.action { padding:10px 20px; font-family:var(--mono); font-size:12px; font-weight:500; letter-spacing:0.05em; color:var(--bg); background:var(--text); border:none; border-radius:4px; cursor:pointer; transition:opacity 0.15s; }
    button.action:hover { opacity:0.8; }
    button.action:disabled { opacity:0.4; cursor:wait; }
    .result-badge { display:inline-block; padding:4px 10px; font-family:var(--mono); font-size:11px; font-weight:500; border-radius:3px; margin-top:8px; }
    .result-badge.valid { background:#d8f3dc; color:var(--success); }
    .result-badge.invalid { background:#ffe0e0; color:var(--error); }
    .divider { border:none; border-top:1px solid var(--border); margin:28px 0; }
    .timing { font-family:var(--mono); font-size:10px; color:var(--muted); margin-top:6px; }

    @media (max-width:600px) { header,.tabs { padding-left:20px; padding-right:20px; } .panels { padding:24px 20px; } }
  </style>
</head>
<body>
<header>
  <h1>schnorr_tool</h1>
  <p>なんかこっちのほうがDSAよりはやいよ</p>
</header>
<div class="tabs" id="tab-bar">
  <button class="tab active" data-tab="keygen">keygen</button>
  <button class="tab" data-tab="sign">sign</button>
  <button class="tab" data-tab="verify">verify</button>

</div>
<div class="panels">

  <!-- keygen -->
  <div id="panel-keygen" class="panel active">
    <div class="field"><button class="action" id="btn-keygen">鍵を生成する</button></div>
    <div id="keygen-timing" class="timing"></div>
    <div class="field">
      <label>private key (hex)</label>
      <div class="output-wrap"><div class="output" id="out-privkey">—</div><button class="copy-btn" data-target="out-privkey">copy</button></div>
    </div>
    <div class="field">
      <label>public key (hex)</label>
      <div class="output-wrap"><div class="output" id="out-pubkey">—</div><button class="copy-btn" data-target="out-pubkey">copy</button></div>
    </div>
  </div>

  <!-- sign -->
  <div id="panel-sign" class="panel">
    <div class="field"><label>message</label><textarea id="sign-message" placeholder="署名するメッセージを入力"></textarea></div>
    <div class="field"><label>private key (hex)</label><input type="text" id="sign-privkey" placeholder="秘密鍵の16進数"></div>
    <div class="field"><button class="action" id="btn-sign">署名する</button></div>
    <div id="sign-timing" class="timing"></div>
    <div class="field">
      <label>signature (hex, R + s)</label>
      <div class="output-wrap"><div class="output" id="out-signature">—</div><button class="copy-btn" data-target="out-signature">copy</button></div>
    </div>
  </div>

  <!-- verify -->
  <div id="panel-verify" class="panel">
    <div class="field"><label>message</label><textarea id="verify-message" placeholder="検証するメッセージを入力"></textarea></div>
    <div class="field"><label>signature (hex)</label><textarea id="verify-signature" placeholder="署名の16進数 (R + s)"></textarea></div>
    <div class="field"><label>public key (hex)</label><textarea id="verify-pubkey" placeholder="公開鍵の16進数"></textarea></div>
    <div class="field"><button class="action" id="btn-verify">検証する</button></div>
    <div id="verify-timing" class="timing"></div>
    <div id="verify-result"></div>
  </div>



</div>

<script>
// ============================================================
// MineSignature class (embedded as-is)
// ============================================================
class MineSignature {
  p = 0x8328e34c3ddb8a2cc8eb63282630870e5f95852318e2278525d633c098e5e0c58d0fdf661f3252757932decb6fbdc10e0f36ee55360c466e492937b95a500150e8b8a891b64d411e3dee482ea0bf2a2ebc1d1129293d62c1d4984211c7ccd543cf295e4f16efcea0719f1a1b57f1c2ec0aee5187ed26db9207641a1a005fc4b2c9a6f9ba0f28ac1517fc9e4e62fc3d6d9e4eb423fad447f80c53400d9ee98adcce5fb202ac8bf19df8851fee00245b6f2755fefc0ee0e3d94d74cbbbb4f05991c53e36734ebcdf0631320596b069c0c5a296da02c8d2ff74f2c75d5b607ea2acda681b52698fc95f30f8b586e78284f6943f6c082c0274871d84d0e0a8a5d728df7ddda05315bedfd1f6c5a81c62b87476a86b85461c19a85075cab431193701753fb271cc3ec4f2ece08d0da4363c89fc6d2c589115b5f48fe86730a5eee26b15d32f6c8f2a714159a33e1a281b43f502a9e8f1a1b7d60cff67d100dbe98fffad67eae35451148c68cd508633be4bf8fc764c9126b722ebd3c3918c69bb6145n;
  g = 0x66f85d95317f5deaba2d3acf50c027a4c91a373912f10aa4fc71644231e69174af340561182fc06e59f72fff1e1acd14c04a58db97f50e358ff0b3ad283e92bcf2655f702871433a26c0ea2e05fe8e01d98efb9549631cba063e296508b11e8da85d9cdcb3cd76386dada171f7293b731517ab2276d06801c4264f71207fb2f3705d27ce0478950d3de6d2caf7c2948393b6bc866760583890a0ad552d8a27266eb55cc506cef3cfdb8aa1feed350e6071ec3108d1800da09bf848e045136656ef2c10985c2b72a26839d1e928a88d034ca59d3cad22a566f1d5d39a6c52a79f9e311accdf975c8fee003bb19db1e16a500d3c067696dbd55944e47d41aeab8f8c7cf9ed9ea0b31fb749e17c2741d0bcdb1b86564e7b060008d3fa2b9cae95d42a9c966380de2f0434d6970bd538bfa3c48ee0c6e07502f51f46bbd866fea580b7be491e9bf17e0084f8607c6a318f55dcfb7ef196083dd99a80dc0e9147ff1f2cdeebc3657a3eebace0e499c00bf71a78f9c1151bfefb0a585f624b90deec59n;
  q = 0x8d035424cff9c8eac9140efb7e2591bf5b2ff96cf1777dba0d667f64f261e999n;

  // Montgomery context
  pCtx; qCtx; gTable;

  constructor() {
    this.pCtx = this.makeMontContext(this.p);
    this.qCtx = this.makeMontContext(this.q);
    this.gTable = this.precomputeTable(this.g, this.p, this.pCtx);
  }

  // --- Montgomery multiplication ---
  bitLength(n) { if (n === 0n) return 0; return n.toString(2).length; }

  makeMontContext(mod) {
    const bits = this.bitLength(mod);
    const modBits = BigInt(bits);
    const R = 1n << modBits;
    const mask = R - 1n;
    const k = bits > 8192 ? 9 : bits > 4096 ? 8 : bits > 2048 ? 7 : bits > 1024 ? 6 : 5;
    let t = 0n, newT = 1n, r = R, m = mod;
    while (m !== 0n) { const qq = r / m; [t, newT] = [newT, t - qq * newT]; [r, m] = [m, r - qq * m]; }
    const nPrime = (R - (t < 0n ? t + R : t)) & mask;
    return { modBits, R, mask, nPrime, k };
  }

  montReduce(T, mod, ctx) {
    const u = ((T & ctx.mask) * ctx.nPrime) & ctx.mask;
    const x = (T + u * mod) >> ctx.modBits;
    return x >= mod ? x - mod : x;
  }

  precomputeTable(base, mod, ctx) {
    const tableSize = 1 << (ctx.k - 1);
    const table = new Array(tableSize);
    const baseBar = (base << ctx.modBits) % mod;
    const baseBar2 = this.montReduce(baseBar * baseBar, mod, ctx);
    table[0] = baseBar;
    for (let i = 1; i < tableSize; i++) table[i] = this.montReduce(table[i - 1] * baseBar2, mod, ctx);
    return table;
  }

  montPowWithTable(table, exp, mod, ctx) {
    let res = (1n << ctx.modBits) % mod;
    let bitPos = this.bitLength(exp) - 1;
    while (bitPos >= 0) {
      const bit = (exp >> BigInt(bitPos)) & 1n;
      if (!bit) { res = this.montReduce(res * res, mod, ctx); bitPos--; }
      else {
        let winSize = 1, winVal = 1n;
        const maxW = Math.min(ctx.k, bitPos + 1);
        for (let j = 1; j < maxW; j++) { winVal = (winVal << 1n) | ((exp >> BigInt(bitPos - j)) & 1n); winSize = j + 1; }
        while (winSize > 1 && !(winVal & 1n)) { winVal >>= 1n; winSize--; }
        for (let s = 0; s < winSize; s++) res = this.montReduce(res * res, mod, ctx);
        res = this.montReduce(res * table[Number(winVal >> 1n)], mod, ctx);
        bitPos -= winSize;
      }
    }
    return this.montReduce(res, mod, ctx);
  }

  montPow(base, exp, mod, ctx) {
    const table = this.precomputeTable(base, mod, ctx);
    return this.montPowWithTable(table, exp, mod, ctx);
  }

  modExp(base, exp, mod) {
    if (mod === this.p) {
      if (base === this.g) return this.montPowWithTable(this.gTable, exp, this.p, this.pCtx);
      return this.montPow(base, exp, this.p, this.pCtx);
    }
    if (mod === this.q) return this.montPow(base, exp, this.q, this.qCtx);
    const ctx = this.makeMontContext(mod);
    return this.montPow(base, exp, mod, ctx);
  }

  // --- SHA-256 ---
  sha256(data) {
    const K = new Uint32Array([
      0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5, 0x3956c25b, 0x59f111f1,
      0x923f82a4, 0xab1c5ed5, 0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3,
      0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174, 0xe49b69c1, 0xefbe4786,
      0x0fc19dc6, 0x240ca1cc, 0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
      0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7, 0xc6e00bf3, 0xd5a79147,
      0x06ca6351, 0x14292967, 0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13,
      0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85, 0xa2bfe8a1, 0xa81a664b,
      0xc24b8b70, 0xc76c51a3, 0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
      0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5, 0x391c0cb3, 0x4ed8aa4a,
      0x5b9cca4f, 0x682e6ff3, 0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208,
      0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2,
    ]);
    const rotr = (x, n) => (x >>> n) | (x << (32 - n));
    let h0 = 0x6a09e667, h1 = 0xbb67ae85, h2 = 0x3c6ef372, h3 = 0xa54ff53a;
    let h4 = 0x510e527f, h5 = 0x9b05688c, h6 = 0x1f83d9ab, h7 = 0x5be0cd19;
    const len = data.length;
    const bitLen = len * 8;
    const blockCount = Math.ceil((len + 9) / 64);
    const blocks = new Uint8Array(blockCount * 64);
    blocks.set(data);
    blocks[len] = 0x80;
    const view = new DataView(blocks.buffer);
    view.setUint32(blocks.length - 8, Math.floor(bitLen / 0x100000000), false);
    view.setUint32(blocks.length - 4, bitLen >>> 0, false);
    for (let i = 0; i < blocks.length; i += 64) {
      const W = new Uint32Array(64);
      for (let t = 0; t < 16; t++) W[t] = view.getUint32(i + t * 4, false);
      for (let t = 16; t < 64; t++) {
        const s0 = rotr(W[t-15],7) ^ rotr(W[t-15],18) ^ (W[t-15]>>>3);
        const s1 = rotr(W[t-2],17) ^ rotr(W[t-2],19) ^ (W[t-2]>>>10);
        W[t] = (((W[t-16]+s0)|0)+((W[t-7]+s1)|0))>>>0;
      }
      let a=h0,b=h1,c=h2,d=h3,e=h4,f=h5,gg=h6,h=h7;
      for (let t = 0; t < 64; t++) {
        const S1 = rotr(e,6) ^ rotr(e,11) ^ rotr(e,25);
        const ch = (e&f) ^ (~e&gg);
        const temp1 = (((h+S1)|0)+(ch|0)+(K[t]|0)+(W[t]|0))>>>0;
        const S0 = rotr(a,2) ^ rotr(a,13) ^ rotr(a,22);
        const maj = (a&b) ^ (a&c) ^ (b&c);
        const temp2 = ((S0+maj)|0)>>>0;
        h=gg; gg=f; f=e; e=(d+temp1)>>>0; d=c; c=b; b=a; a=(temp1+temp2)>>>0;
      }
      h0=(h0+a)>>>0; h1=(h1+b)>>>0; h2=(h2+c)>>>0; h3=(h3+d)>>>0;
      h4=(h4+e)>>>0; h5=(h5+f)>>>0; h6=(h6+gg)>>>0; h7=(h7+h)>>>0;
    }
    const result = new Uint8Array(32);
    const rv = new DataView(result.buffer);
    rv.setUint32(0,h0,false); rv.setUint32(4,h1,false); rv.setUint32(8,h2,false); rv.setUint32(12,h3,false);
    rv.setUint32(16,h4,false); rv.setUint32(20,h5,false); rv.setUint32(24,h6,false); rv.setUint32(28,h7,false);
    return result;
  }

  // --- Byte utilities ---
  get pByteLen() { return Math.ceil(this.p.toString(16).length / 2); }

  bigintToUint8Array(bn, byteLen) {
    const padLen = byteLen || this.pByteLen;
    let hex = bn.toString(16);
    if (hex.length % 2) hex = '0' + hex;
    const len = hex.length / 2;
    const u8 = new Uint8Array(padLen);
    for (let i = 0; i < len; i++) u8[padLen - len + i] = parseInt(hex.slice(i*2, i*2+2), 16);
    return u8;
  }

  uint8ArrayToBigInt(u8) {
    const len = u8.length; let res = 0n;
    const view = new DataView(u8.buffer, u8.byteOffset, len);
    let i = 0;
    for (; i <= len - 8; i += 8) res = (res << 64n) + view.getBigUint64(i);
    for (; i < len; i++) res = (res << 8n) + BigInt(u8[i]);
    return res;
  }

  hashToBigInt(data) {
    return this.uint8ArrayToBigInt(this.sha256(data));
  }

  // --- Schnorr operations ---
  getPublicKey(privateKey) {
    const priv = this.uint8ArrayToBigInt(privateKey);
    const pub = this.modExp(this.g, priv, this.p);
    return this.bigintToUint8Array(pub);
  }

  sign(message, privateKey) {
    const priv = this.uint8ArrayToBigInt(privateKey);
    const msgData = new TextEncoder().encode(message);
    const kSeed = new Uint8Array([...privateKey, ...msgData]);
    const k = this.hashToBigInt(kSeed) % this.q;
    const R = this.modExp(this.g, k, this.p);
    const R_bytes = this.bigintToUint8Array(R);
    const e = this.hashToBigInt(new Uint8Array([...R_bytes, ...msgData])) % this.q;
    const s = (k + (e * priv)) % this.q;
    const sigLen = this.pByteLen;
    const signature = new Uint8Array(sigLen * 2);
    signature.set(R_bytes, 0);
    signature.set(this.bigintToUint8Array(s), sigLen);
    return signature;
  }

  verify(message, signature, publicKey) {
    const sigLen = this.pByteLen;
    if (signature.length !== sigLen * 2) return false;
    const pub = this.uint8ArrayToBigInt(publicKey);
    const msgData = new TextEncoder().encode(message);
    const R_bytes = signature.slice(0, sigLen);
    const s_bytes = signature.slice(sigLen, sigLen * 2);
    const R = this.uint8ArrayToBigInt(R_bytes);
    const s = this.uint8ArrayToBigInt(s_bytes);
    const e = this.hashToBigInt(new Uint8Array([...R_bytes, ...msgData])) % this.q;
    const leftSide = this.modExp(this.g, s, this.p);
    const rightSide = (R * this.modExp(pub, e, this.p)) % this.p;
    return leftSide === rightSide;
  }
}

// ============================================================
// Utility
// ============================================================
const mSign = new MineSignature();
const enc = new TextEncoder();

function u8toHex(u8) {
  return Array.from(u8).map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();
}

function hexToU8(hex) {
  hex = hex.replace(/\s/g, '');
  if (hex.length % 2) hex = '0' + hex;
  const u8 = new Uint8Array(hex.length / 2);
  for (let i = 0; i < u8.length; i++) u8[i] = parseInt(hex.slice(i*2, i*2+2), 16);
  return u8;
}

function shortHex(hex, n = 24) {
  if (hex.length <= n * 2) return hex;
  return hex.slice(0, n) + '…' + hex.slice(-n);
}

// ============================================================
// DOM
// ============================================================
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

function setOutput(id, text) { document.getElementById(id).textContent = text; }

// Tabs
$('#tab-bar').addEventListener('click', (e) => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  const tab = btn.dataset.tab;
  $$('.tab').forEach(t => t.classList.remove('active'));
  $$('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  $(`#panel-${tab}`).classList.add('active');
});

// Copy buttons
document.addEventListener('click', (e) => {
  const btn = e.target.closest('.copy-btn');
  if (!btn) return;
  const target = btn.dataset.target;
  const text = document.getElementById(target).textContent;
  if (text === '—') return;
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'copied';
    setTimeout(() => btn.textContent = orig, 1200);
  });
});

// ============================================================
// keygen
// ============================================================
$('#btn-keygen').addEventListener('click', () => {
  const btn = $('#btn-keygen');
  btn.disabled = true; btn.textContent = '生成中…';

  requestAnimationFrame(() => {
    const t0 = performance.now();

    const myPrivKey = new Uint8Array(32);
    crypto.getRandomValues(myPrivKey);
    const myPubKey = mSign.getPublicKey(myPrivKey);

    const ms = (performance.now() - t0).toFixed(1);

    setOutput('out-privkey', u8toHex(myPrivKey));
    setOutput('out-pubkey', u8toHex(myPubKey));
    $('#keygen-timing').textContent = `${ms}ms`;

    btn.disabled = false; btn.textContent = '鍵を生成する';
  });
});

// ============================================================
// sign
// ============================================================
$('#btn-sign').addEventListener('click', () => {
  const msg = $('#sign-message').value;
  const privHex = $('#sign-privkey').value.trim();
  if (!msg || !privHex) return;

  const btn = $('#btn-sign');
  btn.disabled = true; btn.textContent = '署名中…';

  requestAnimationFrame(() => {
    try {
      const privKey = hexToU8(privHex);
      const t0 = performance.now();
      const signature = mSign.sign(msg, privKey);
      const ms = (performance.now() - t0).toFixed(1);

      setOutput('out-signature', u8toHex(signature));
      $('#sign-timing').textContent = `${ms}ms (${signature.length} bytes)`;
    } catch (e) {
      setOutput('out-signature', 'エラー: ' + e.message);
    }
    btn.disabled = false; btn.textContent = '署名する';
  });
});

// ============================================================
// verify
// ============================================================
$('#btn-verify').addEventListener('click', () => {
  const msg = $('#verify-message').value;
  const sigHex = $('#verify-signature').value.trim();
  const pubHex = $('#verify-pubkey').value.trim();
  if (!msg || !sigHex || !pubHex) return;

  const btn = $('#btn-verify');
  btn.disabled = true; btn.textContent = '検証中…';

  requestAnimationFrame(() => {
    try {
      const signature = hexToU8(sigHex);
      const pubKey = hexToU8(pubHex);

      const t0 = performance.now();
      const valid = mSign.verify(msg, signature, pubKey);
      const ms = (performance.now() - t0).toFixed(1);

      $('#verify-timing').textContent = `${ms}ms`;
      $('#verify-result').innerHTML = `<span class="result-badge ${valid ? 'valid' : 'invalid'}">${valid ? '有効' : '無効'}</span>`;
    } catch (e) {
      $('#verify-result').innerHTML = `<span class="result-badge invalid">エラー: ${e.message}</span>`;
    }
    btn.disabled = false; btn.textContent = '検証する';
  });
});


</script>
</body>
</html>
