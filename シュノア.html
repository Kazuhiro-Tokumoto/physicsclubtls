<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Schnorr Signature Tool</title>
  <link rel="icon" href="https://illustimage.com/photo/12720.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; touch-action: manipulation; }
    :root {
      --bg: #f7f6f3; --surface: #ffffff; --border: #e2e0db;
      --text: #1a1917; --muted: #8a8780; --accent: #1a1917;
      --success: #2d6a4f; --error: #c1121f;
      --mono: 'JetBrains Mono', monospace; --sans: 'DM Sans', sans-serif;
    }
    body { margin:0; padding:0; background:var(--bg); color:var(--text); font-family:var(--sans); font-size:14px; line-height:1.6; min-height:100vh; }
    header { padding:32px 40px 24px; border-bottom:1px solid var(--border); background:var(--surface); }
    header h1 { margin:0; font-family:var(--mono); font-size:18px; font-weight:400; letter-spacing:0.05em; }
    header p { margin:4px 0 0; font-size:12px; color:var(--muted); font-family:var(--mono); }
    .tabs { display:flex; padding:0 40px; background:var(--surface); border-bottom:1px solid var(--border); }
    .tab { padding:12px 20px; font-family:var(--mono); font-size:12px; color:var(--muted); cursor:pointer; border:none; background:none; border-bottom:2px solid transparent; margin-bottom:-1px; transition:color 0.15s,border-color 0.15s; letter-spacing:0.05em; }
    .tab:hover { color:var(--text); }
    .tab.active { color:var(--text); border-bottom-color:var(--text); }
    .panels { max-width:720px; margin:0 auto; padding:32px 40px; }
    .panel { display:none; }
    .panel.active { display:block; }
    .field { margin-bottom:20px; }
    label { display:block; font-family:var(--mono); font-size:11px; font-weight:500; letter-spacing:0.08em; color:var(--muted); text-transform:uppercase; margin-bottom:6px; }
    input[type="text"], textarea { width:100%; padding:10px 12px; font-family:var(--mono); font-size:12px; line-height:1.6; color:var(--text); background:var(--surface); border:1px solid var(--border); border-radius:4px; outline:none; resize:vertical; transition:border-color 0.15s; }
    input[type="text"]:focus, textarea:focus { border-color:var(--text); }
    textarea { min-height:72px; }
    .output { width:100%; padding:10px 12px; font-family:var(--mono); font-size:11px; line-height:1.7; color:var(--text); background:var(--bg); border:1px solid var(--border); border-radius:4px; word-break:break-all; min-height:40px; white-space:pre-wrap; user-select:all; }
    .output-wrap { position:relative; }
    .copy-btn { position:absolute; top:6px; right:6px; padding:3px 8px; font-family:var(--mono); font-size:10px; color:var(--muted); background:var(--surface); border:1px solid var(--border); border-radius:3px; cursor:pointer; transition:color 0.15s,border-color 0.15s; }
    .copy-btn:hover { color:var(--text); border-color:var(--text); }
    button.action { padding:10px 20px; font-family:var(--mono); font-size:12px; font-weight:500; letter-spacing:0.05em; color:var(--bg); background:var(--text); border:none; border-radius:4px; cursor:pointer; transition:opacity 0.15s; }
    button.action:hover { opacity:0.8; }
    button.action:disabled { opacity:0.4; cursor:wait; }
    .result-badge { display:inline-block; padding:4px 10px; font-family:var(--mono); font-size:11px; font-weight:500; border-radius:3px; margin-top:8px; }
    .result-badge.valid { background:#d8f3dc; color:var(--success); }
    .result-badge.invalid { background:#ffe0e0; color:var(--error); }
    .divider { border:none; border-top:1px solid var(--border); margin:28px 0; }
    .timing { font-family:var(--mono); font-size:10px; color:var(--muted); margin-top:6px; }

    @media (max-width:600px) { header,.tabs { padding-left:20px; padding-right:20px; } .panels { padding:24px 20px; } }
  </style>
</head>
<body>
<header>
  <h1>schnorr_tool</h1>
  <p>署名でっけぇけどDSAよりはえーぞ</p>
</header>
<div class="tabs" id="tab-bar">
  <button class="tab active" data-tab="keygen">keygen</button>
  <button class="tab" data-tab="sign">sign</button>
  <button class="tab" data-tab="verify">verify</button>
  <button class="tab" data-tab="privtopub">priv→pub</button>
</div>
<div class="panels">

  <!-- keygen -->
  <div id="panel-keygen" class="panel active">
    <div class="field"><button class="action" id="btn-keygen">鍵を生成する</button></div>
    <div id="keygen-timing" class="timing"></div>
    <div class="field">
      <label>private key (hex)</label>
      <div class="output-wrap"><div class="output" id="out-privkey">—</div><button class="copy-btn" data-target="out-privkey">copy</button></div>
    </div>
    <div class="field">
      <label>public key (hex)</label>
      <div class="output-wrap"><div class="output" id="out-pubkey">—</div><button class="copy-btn" data-target="out-pubkey">copy</button></div>
    </div>
  </div>

  <!-- sign -->
  <div id="panel-sign" class="panel">
    <div class="field"><label>message</label><textarea id="sign-message" placeholder="署名するメッセージを入力"></textarea></div>
    <div class="field"><label>private key (hex)</label><input type="text" id="sign-privkey" placeholder="秘密鍵の16進数"></div>
    <div class="field"><button class="action" id="btn-sign">署名する</button></div>
    <div id="sign-timing" class="timing"></div>
    <div class="field">
      <label>signature (hex, R + s)</label>
      <div class="output-wrap"><div class="output" id="out-signature">—</div><button class="copy-btn" data-target="out-signature">copy</button></div>
    </div>
  </div>

  <!-- verify -->
  <div id="panel-verify" class="panel">
    <div class="field"><label>message</label><textarea id="verify-message" placeholder="検証するメッセージを入力"></textarea></div>
    <div class="field"><label>signature (hex)</label><textarea id="verify-signature" placeholder="署名の16進数 (R + s)"></textarea></div>
    <div class="field"><label>public key (hex)</label><textarea id="verify-pubkey" placeholder="公開鍵の16進数"></textarea></div>
    <div class="field"><button class="action" id="btn-verify">検証する</button></div>
    <div id="verify-timing" class="timing"></div>
    <div id="verify-result"></div>
  </div>
  <!-- privtopub -->
  <div id="panel-privtopub" class="panel">
    <div class="field"><label>private key (hex)</label><input type="text" id="privtopub-input" placeholder="秘密鍵の16進数"></div>
    <div class="field"><button class="action" id="btn-privtopub">公開鍵を導出する</button></div>
    <div id="privtopub-timing" class="timing"></div>
    <div class="field">
      <label>public key (hex)</label>
      <div class="output-wrap"><div class="output" id="out-privtopub">—</div><button class="copy-btn" data-target="out-privtopub">copy</button></div>
    </div>
  </div>



</div>

 const params = new URLSearchParams(window.location.search);
const turbo = params.get('omg') === 'true';
const mSign = new MineSignature(turbo);
const enc = new TextEncoder();

function u8toHex(u8) {
  return Array.from(u8).map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();
}

function hexToU8(hex) {
  hex = hex.replace(/\s/g, '');
  if (!/^[0-9a-fA-F]+$/.test(hex)) throw new Error('無効な16進数');
  if (hex.length % 2) hex = '0' + hex;
  const u8 = new Uint8Array(hex.length / 2);
  for (let i = 0; i < u8.length; i++) u8[i] = parseInt(hex.slice(i*2, i*2+2), 16);
  return u8;
}

function shortHex(hex, n = 24) {
  if (hex.length <= n * 2) return hex;
  return hex.slice(0, n) + '…' + hex.slice(-n);
}

const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

function setOutput(id, text) { document.getElementById(id).textContent = text; }

// Tabs
$('#tab-bar').addEventListener('click', (e) => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  const tab = btn.dataset.tab;
  $$('.tab').forEach(t => t.classList.remove('active'));
  $$('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  $(`#panel-${tab}`).classList.add('active');
});

// Copy buttons
document.addEventListener('click', (e) => {
  const btn = e.target.closest('.copy-btn');
  if (!btn) return;
  const target = btn.dataset.target;
  const text = document.getElementById(target).textContent;
  if (text === '—') return;
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'copied';
    setTimeout(() => btn.textContent = orig, 1200);
  });
});

$('#btn-sign').addEventListener('click', () => {
  const msg = $('#sign-message').value;
  const privHex = $('#sign-privkey').value.trim();
  if (!msg || !privHex) return;

  const btn = $('#btn-sign');
  btn.disabled = true; btn.textContent = '署名中…';

  requestAnimationFrame(() => {
    try {
      const privKey = hexToU8(privHex);
      const t0 = performance.now();
      const signature = mSign.sign(msg, privKey);
      const ms = (performance.now() - t0).toFixed(1);

      setOutput('out-signature', u8toHex(signature));
      $('#sign-timing').textContent = `${ms}ms (${signature.length} bytes)`;
    } catch (e) {
      setOutput('out-signature', 'エラー: ' + e.message);
    }
    btn.disabled = false; btn.textContent = '署名する';
  });
});

// ============================================================
// verify
// ============================================================
$('#btn-verify').addEventListener('click', () => {
  const msg = $('#verify-message').value;
  const sigHex = $('#verify-signature').value.trim();
  const pubHex = $('#verify-pubkey').value.trim();
  if (!msg || !sigHex || !pubHex) return;

  const btn = $('#btn-verify');
  btn.disabled = true; btn.textContent = '検証中…';

  requestAnimationFrame(() => {
    try {
      const signature = hexToU8(sigHex);
      const pubKey = hexToU8(pubHex);

      const t0 = performance.now();
      const valid = mSign.verify(msg, signature, pubKey);
      const ms = (performance.now() - t0).toFixed(1);

      $('#verify-timing').textContent = `${ms}ms`;
      $('#verify-result').innerHTML = `<span class="result-badge ${valid ? 'valid' : 'invalid'}">${valid ? '有効' : '無効'}</span>`;
    } catch (e) {
      $('#verify-result').innerHTML = `<span class="result-badge invalid">エラー: ${e.message}</span>`;
    }
    btn.disabled = false; btn.textContent = '検証する';
  });
});

// ============================================================
// priv → pub
// ============================================================
$('#btn-privtopub').addEventListener('click', () => {
  const hex = $('#privtopub-input').value.trim();
  if (!hex) return;

  const btn = $('#btn-privtopub');
  btn.disabled = true; btn.textContent = '導出中…';

  requestAnimationFrame(() => {
    try {
      const privKey = hexToU8(hex);
      const t0 = performance.now();
      const pubKey = mSign.getPublicKey(privKey);
      const ms = (performance.now() - t0).toFixed(1);

      setOutput('out-privtopub', u8toHex(pubKey));
      $('#privtopub-timing').textContent = `${ms}ms`;
    } catch (e) {
      setOutput('out-privtopub', 'エラー: ' + e.message);
    }
    btn.disabled = false; btn.textContent = '公開鍵を導出する';
  });
});


</script>
